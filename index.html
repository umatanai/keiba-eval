<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NC-Modeler V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --orange: #ff9800; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { font-size: 0.9rem; margin: 0 0 10px 0; color: var(--orange); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        .col { flex: 1; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 2px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 0.9rem; box-sizing: border-box; }
        #canvas-container { width: 100%; height: 250px; background: #000; border-radius: 10px; margin-bottom: 10px; position: relative; }
        .origin-selector { display: flex; gap: 10px; }
        .origin-btn { flex: 1; padding: 12px; background: #333; border-radius: 8px; text-align: center; font-size: 0.8rem; border: 1px solid #444; }
        .origin-btn.active { background: var(--orange); color: #000; font-weight: bold; }
        .add-btn { width: 100%; padding: 12px; background: #444; border: none; border-radius: 8px; color: #fff; margin-top: 10px; font-weight: bold; }
        .feature-list { margin-top: 10px; font-size: 0.8rem; color: #aaa; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="card">
    <h2>1. ワーク寸法 (最終形状)</h2>
    <div class="row">
        <div class="col"><label>幅 X</label><input type="number" id="wX" value="100" oninput="drawAll()"></div>
        <div class="col"><label>長さ Y</label><input type="number" id="wY" value="100" oninput="drawAll()"></div>
        <div class="col"><label>厚み Z</label><input type="number" id="wZ" value="20" oninput="drawAll()"></div>
    </div>
</div>

<div class="card">
    <h2>2. 素材寸法 (削りしろ)</h2>
    <div class="row">
        <div class="col"><label>XY追加量(片側)</label><input type="number" id="mXY" value="2" oninput="drawAll()"></div>
        <div class="col"><label>上面追加量</label><input type="number" id="mZ" value="1" oninput="drawAll()"></div>
    </div>
</div>

<div class="card">
    <h2>3. 原点位置 (G54)</h2>
    <div class="origin-selector">
        <div class="origin-btn active" id="btn_CC" onclick="setOrigin('CC')">中央</div>
        <div class="origin-btn" id="btn_BR" onclick="setOrigin('BR')">右下</div>
    </div>
</div>

<div class="card">
    <h2>4. フィーチャー追加</h2>
    <div class="row">
        <select id="fType" style="flex:1.5;"><option value="hole">穴</option><option value="boss">ボス</option></select>
        <input type="number" id="fX" placeholder="X" style="flex:1;">
        <input type="number" id="fY" placeholder="Y" style="flex:1;">
        <input type="number" id="fD" placeholder="径" style="flex:1;">
        <input type="number" id="fZ" placeholder="深/高" style="flex:1;">
    </div>
    <button class="add-btn" onclick="addFeature()">モデルに反映・追加</button>
    <div id="featureList" class="feature-list"></div>
</div>

<script>
    let scene, camera, renderer, modelGroup;
    let currentOrigin = 'CC';
    let features = [];

    function init() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
        camera.position.set(100, 100, 150);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(50, 100, 50);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 原点軸 (RGB)
        scene.add(new THREE.AxesHelper(30));

        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        drawAll();
        animate();
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

    function setOrigin(o) {
        currentOrigin = o;
        document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + o).classList.add('active');
        drawAll();
    }

    function addFeature() {
        const type = document.getElementById('fType').value;
        const x = parseFloat(document.getElementById('fX').value) || 0;
        const y = parseFloat(document.getElementById('fY').value) || 0;
        const d = parseFloat(document.getElementById('fD').value) || 10;
        const z = parseFloat(document.getElementById('fZ').value) || 5;
        features.push({type, x, y, d, z});
        
        const list = document.getElementById('featureList');
        list.innerHTML += `<div>${type === 'hole' ? '穴' : 'ボス'}: X${x} Y${y} D${d} Z${z}</div>`;
        drawAll();
    }

    function drawAll() {
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);

        const wx = parseFloat(document.getElementById('wX').value);
        const wy = parseFloat(document.getElementById('wY').value);
        const wz = parseFloat(document.getElementById('wZ').value);
        const mxy = parseFloat(document.getElementById('mXY').value);
        const mz = parseFloat(document.getElementById('mZ').value);

        // オフセット計算
        let ox = (currentOrigin === 'CC') ? 0 : -wx;
        let oy = (currentOrigin === 'CC') ? 0 : 0; // 右下基準: Xはマイナスへ、Yはプラス側へ広がる想定

        // ワーク本体
        const workGeo = new THREE.BoxGeometry(wx, wz, wy);
        const workMat = new THREE.MeshPhongMaterial({ color: 0x444444, wireframe: false });
        const work = new THREE.Mesh(workGeo, workMat);
        work.position.set(wx/2 + ox, -wz/2, wy/2 + oy);
        modelGroup.add(work);

        // 素材(ストック)
        const stockGeo = new THREE.BoxGeometry(wx + mxy*2, wz + mz, wy + mxy*2);
        const stockMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.2 });
        const stock = new THREE.Mesh(stockGeo, stockMat);
        stock.position.set(wx/2 + ox, - (wz+mz)/2 + mz, wy/2 + oy);
        modelGroup.add(stock);

        // フィーチャー(穴・ボス)の描画
        features.forEach(f => {
            const geo = new THREE.CylinderGeometry(f.d/2, f.d/2, f.z, 32);
            const col = (f.type === 'hole') ? 0xff0000 : 0x00ff00;
            const mat = new THREE.MeshPhongMaterial({ color: col });
            const mesh = new THREE.Mesh(geo, mat);
            
            // 穴は沈める、ボスは浮かせる
            const zPos = (f.type === 'hole') ? -f.z/2 : f.z/2;
            mesh.position.set(f.x + ox, zPos, f.y + oy);
            modelGroup.add(mesh);
        });
    }

    window.onload = init;
</script>
</body>
</html>
