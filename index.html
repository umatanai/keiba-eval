<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NC-Modeler V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --orange: #ff9800; --bg: #000; --card: #1a1a1a; --text: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #view-container { position: sticky; top: 0; width: 100%; height: 40vh; background: #080808; z-index: 10; border-bottom: 1px solid #333; }
        #settings-container { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        h2 { font-size: 0.85rem; margin: 0 0 12px 0; color: var(--orange); border-bottom: 1px solid #333; padding-bottom: 6px; text-transform: uppercase; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 1rem; box-sizing: border-box; }
        .origin-selector { display: flex; gap: 10px; }
        .origin-btn { flex: 1; padding: 12px; background: #333; border-radius: 8px; text-align: center; font-size: 0.9rem; border: 1px solid #444; color: #999; }
        .origin-btn.active { background: var(--orange); color: #000; font-weight: bold; border-color: var(--orange); }
        .calc-box { background: #000; padding: 10px; border-radius: 6px; border: 1px solid #333; margin-top: 10px; font-family: monospace; font-size: 0.75rem; color: #00ff00; }
        .add-btn { width: 100%; padding: 15px; background: var(--orange); border: none; border-radius: 8px; color: #000; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="view-container"></div>

<div id="settings-container">
    <div class="card">
        <h2>1. ワーク寸法 (最終形状)</h2>
        <div class="row">
            <div class="col"><label>幅 X</label><input type="number" id="wX" value="100" oninput="draw()"></div>
            <div class="col"><label>長さ Y</label><input type="number" id="wY" value="100" oninput="draw()"></div>
            <div class="col"><label>厚み Z</label><input type="number" id="wZ" value="20" oninput="draw()"></div>
        </div>
    </div>

    <div class="card">
        <h2>2. 材料サイズ (素材そのもの)</h2>
        <div class="row">
            <div class="col"><label>材料幅 X</label><input type="number" id="mX" value="105" oninput="draw()"></div>
            <div class="col"><label>材料長さ Y</label><input type="number" id="mY" value="105" oninput="draw()"></div>
        </div>
        <div class="row">
            <div class="col"><label>上面取りしろ</label><input type="number" id="mZ_top" value="1" oninput="draw()"></div>
            <div class="col"><label>材料厚み</label><input type="number" id="mZ_total" value="25" oninput="draw()"></div>
        </div>
        <div id="calcInfo" class="calc-box"></div>
    </div>

    <div class="card">
        <h2>3. 原点位置 (G54)</h2>
        <div class="origin-selector">
            <div class="origin-btn active" id="btn_CC" onclick="setOrigin('CC')">中央</div>
            <div class="origin-btn" id="btn_BR" onclick="setOrigin('BR')">右下</div>
        </div>
    </div>

    <div class="card">
        <h2>4. フィーチャー追加</h2>
        <div class="row">
            <select id="fType" style="flex:1;"><option value="hole">穴</option><option value="boss">ボス</option></select>
            <input type="number" id="fX" placeholder="X座標" style="flex:1;">
            <input type="number" id="fY" placeholder="Y座標" style="flex:1;">
        </div>
        <div class="row">
            <input type="number" id="fD" placeholder="直径" style="flex:1;">
            <input type="number" id="fZ" placeholder="深さ/高さ" style="flex:1;">
        </div>
        <button class="add-btn" onclick="addFeature()">モデルに追加</button>
    </div>
</div>

<script>
    let scene, camera, renderer, controls, modelGroup, axes;
    let currentOrigin = 'CC';
    let features = [];

    function init() {
        const container = document.getElementById('view-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 3000);
        camera.position.set(150, 150, 150);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0x808080));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        axes = new THREE.AxesHelper(60); // X:赤, Y:緑, Z:青
        scene.add(axes);

        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        draw();
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    function setOrigin(o) {
        currentOrigin = o;
        document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + o).classList.add('active');
        draw();
    }

    function addFeature() {
        const type = document.getElementById('fType').value;
        const x = parseFloat(document.getElementById('fX').value) || 0;
        const y = parseFloat(document.getElementById('fY').value) || 0;
        const d = parseFloat(document.getElementById('fD').value) || 10;
        const z = parseFloat(document.getElementById('fZ').value) || 5;
        features.push({type, x, y, d, z});
        draw();
    }

    function draw() {
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);

        const wx = parseFloat(document.getElementById('wX').value);
        const wy = parseFloat(document.getElementById('wY').value);
        const wz = parseFloat(document.getElementById('wZ').value);
        const mx = parseFloat(document.getElementById('mX').value);
        const my = parseFloat(document.getElementById('mY').value);
        const mz_top = parseFloat(document.getElementById('mZ_top').value);
        const mz_total = parseFloat(document.getElementById('mZ_total').value);

        // 情報表示
        const bottom_clr = mz_total - wz - mz_top;
        document.getElementById('calcInfo').innerHTML = `底面取りしろ(クランプ可能域): ${bottom_clr.toFixed(2)} mm`;

        // 配置オフセット
        let ox = (currentOrigin === 'CC') ? 0 : -wx;
        let oy = (currentOrigin === 'CC') ? 0 : 0; // 右下起点：Y軸は奥(プラス)へ

        // ワーク本体
        const workGeo = new THREE.BoxGeometry(wx, wz, wy);
        const workMat = new THREE.MeshPhongMaterial({ color: 0x555555, transparent: true, opacity: 0.8 });
        const work = new THREE.Mesh(workGeo, workMat);
        // 上面をZ0にする配置
        work.position.set(wx/2 + ox, -wz/2, wy/2 + oy);
        modelGroup.add(work);

        // 材料 (ワイヤーフレーム)
        const matGeo = new THREE.BoxGeometry(mx, mz_total, my);
        const matMat = new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true });
        const stock = new THREE.Mesh(matGeo, matMat);
        // ワークと同じ中心に配置（XY）し、Zだけ上面取りしろ分上げる
        stock.position.set(wx/2 + ox, - (wz + mz_top) + mz_total/2, wy/2 + oy);
        modelGroup.add(stock);

        // フィーチャー
        features.forEach(f => {
            const geo = new THREE.CylinderGeometry(f.d/2, f.d/2, f.z, 32);
            const isHole = f.type === 'hole';
            const mat = new THREE.MeshPhongMaterial({ color: isHole ? 0x990000 : 0x00ff00 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // 穴は上面(Z0)から下へ、ボスは上面から上へ
            const yPos = isHole ? -f.z/2 : f.z/2;
            mesh.position.set(f.x + ox, yPos, f.y + oy);
            modelGroup.add(mesh);
        });
    }

    window.onload = init;
</script>
</body>
</html>
