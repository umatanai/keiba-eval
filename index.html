<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CNC Visualizer - Inventory App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #121212; color: #fff; font-family: sans-serif; }
        #container { display: flex; flex-direction: column; height: 100vh; }
        #canvas-container { flex: 1; position: relative; }
        #controls { padding: 15px; background: #1e1e1e; border-top: 2px solid #333; overflow-y: auto; max-height: 50%; }
        
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .label { color: #ffa726; font-weight: bold; margin-bottom: 8px; display: block; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: #fff; }
        button.active { background: #ffa726; color: #000; }
        
        .feature-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        input, select { padding: 8px; background: #2c2c2c; border: 1px solid #444; color: #fff; border-radius: 4px; }
        
        #add-btn { background: #ffa726; color: #000; font-weight: bold; margin-top: 10px; width: 100%; }
        
        #feature-list { margin-top: 15px; list-style: none; padding: 0; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; background: #2c2c2c; padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; font-size: 0.9em; }
        .del-btn { background: #e53935; color: white; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; flex: none; width: auto; }
    </style>
</head>
<body>

<div id="container">
    <div id="canvas-container"></div>
    
    <div id="controls">
        <div class="input-group">
            <span class="label">3. 原点位置 (G54)</span>
            <div class="btn-group">
                <button id="origin-center" onclick="setOrigin('center')">中央</button>
                <button id="origin-br" class="active" onclick="setOrigin('bottom-right')">右下</button>
            </div>
        </div>

        <div class="input-group">
            <span class="label">4. フィーチャー追加</span>
            <div class="feature-inputs">
                <select id="f-type">
                    <option value="穴">穴</option>
                </select>
                <input type="number" id="f-x" placeholder="X座標">
                <input type="number" id="f-y" placeholder="Y座標">
                <input type="number" id="f-dia" placeholder="直径">
                <input type="number" id="f-depth" placeholder="深さ">
            </div>
            <button id="add-btn" onclick="addFeature()">モデルに追加</button>
            
            <ul id="feature-list"></ul>
        </div>
    </div>
</div>

<script>
// --- 基本設定 ---
let scene, camera, renderer, workpiece, axes;
let features = [];
let originMode = 'bottom-right'; // 初期値は右下

// 材料サイズ (仮)
const workW = 100;
const workH = 80;
const workD = 20;

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight*0.5), 0.1, 1000);
    camera.position.set(120, 120, 120);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.5);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // 環境光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // 座標軸 (Red:X, Green:Y, Blue:Z)
    axes = new THREE.AxesHelper(50);
    scene.add(axes);

    renderWorkpiece();
}

// ワークとフィーチャーの描画
function renderWorkpiece() {
    if (workpiece) scene.remove(workpiece);
    workpiece = new THREE.Group();

    // 材料（本体）の作成
    const geometry = new THREE.BoxGeometry(workW, workD, workH); // Three.jsはYが高さ
    const material = new THREE.MeshPhongMaterial({ color: 0x555555, transparent: true, opacity: 0.7, wireframe: false });
    const box = new THREE.Mesh(geometry, material);

    // エッジ線
    const edges = new THREE.EdgesGeometry(geometry);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
    box.add(line);

    // 原点位置によるオフセット計算
    // 右下(手前右)の場合：ワークをXマイナス、Zプラス（画面上のY方向）にずらす
    if (originMode === 'bottom-right') {
        box.position.set(-workW / 2, -workD / 2, workH / 2);
    } else {
        box.position.set(0, -workD / 2, 0);
    }
    
    workpiece.add(box);

    // フィーチャー（穴）の描画
    features.forEach(f => {
        const holeGeom = new THREE.CylinderGeometry(f.dia / 2, f.dia / 2, f.depth + 2, 32);
        const holeMat = new THREE.MeshPhongMaterial({ color: 0x00ffff });
        const hole = new THREE.Mesh(holeGeom, holeMat);
        
        // 穴の座標配置
        if (originMode === 'bottom-right') {
            hole.position.set(f.x, -f.depth / 2, -f.y); // 原点からの相対座標
        } else {
            hole.position.set(f.x, -f.depth / 2, -f.y);
        }
        workpiece.add(hole);
    });

    scene.add(workpiece);
}

// 原点切り替え
function setOrigin(mode) {
    originMode = mode;
    document.getElementById('origin-center').classList.toggle('active', mode === 'center');
    document.getElementById('origin-br').classList.toggle('active', mode === 'bottom-right');
    renderWorkpiece();
}

// フィーチャー追加
function addFeature() {
    const feature = {
        id: Date.now(),
        type: document.getElementById('f-type').value,
        x: parseFloat(document.getElementById('f-x').value) || 0,
        y: parseFloat(document.getElementById('f-y').value) || 0,
        dia: parseFloat(document.getElementById('f-dia').value) || 10,
        depth: parseFloat(document.getElementById('f-depth').value) || 5
    };
    features.push(feature);
    updateFeatureList();
    renderWorkpiece();
}

// フィーチャー削除
function removeFeature(id) {
    features = features.filter(f => f.id !== id);
    updateFeatureList();
    renderWorkpiece();
}

// UIリスト更新
function updateFeatureList() {
    const list = document.getElementById('feature-list');
    list.innerHTML = features.map(f => `
        <li class="feature-item">
            <span>${f.type} (X:${f.x}, Y:${f.y}, φ:${f.dia})</span>
            <button class="del-btn" onclick="removeFeature(${f.id})">削除</button>
        </li>
    `).join('');
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

// リサイズ対応
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / (window.innerHeight * 0.5);
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight * 0.5);
});
</script>
</body>
</html>
